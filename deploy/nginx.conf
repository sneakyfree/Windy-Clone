# Windy Clone — Nginx reverse proxy
# Serves on port 443 (HTTPS) and proxies to the API on 8400.
# Frontend is served from the built static files.

upstream clone_api {
    server 127.0.0.1:8400;
}

server {
    listen 80;
    server_name windyclone.com www.windyclone.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name windyclone.com www.windyclone.com;

    # SSL certs (managed by Let's Encrypt / certbot)
    ssl_certificate     /etc/letsencrypt/live/windyclone.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/windyclone.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── API routes ──
    location /api/ {
        proxy_pass http://clone_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://clone_api;
    }

    # ── Static frontend ──
    location / {
        root /app/web/dist;
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ── Assets (long cache) ──
    location /assets/ {
        root /app/web/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
}
